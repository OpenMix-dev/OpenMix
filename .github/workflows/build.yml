name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install non-Qt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev liblo-dev libasound2-dev build-essential cmake

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.11.0"
          host: "linux"
          target: "desktop"
          arch: "linux_gcc_64"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMix-linux
          path: build/OpenMix

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.11.0"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"

      - name: Install liblo via vcpkg
        run: vcpkg install liblo:x64-windows

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --parallel

      - name: Deploy Qt
        run: |
          mkdir build\deploy
          copy build\OpenMix.exe build\deploy\
          windeployqt --release build\deploy\OpenMix.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMix-windows
          path: build/deploy/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install qt@6 liblo

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Configure
        run: |
          export PATH="/opt/homebrew/opt/qt@6/bin:$PATH"
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/opt/homebrew/opt/qt@6

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy, sign, & package
        run: |
          /opt/homebrew/opt/qt@6/bin/macdeployqt build/OpenMix.app
          xattr -cr build/OpenMix.app
          codesign --force --deep -s - build/OpenMix.app
          cd build
          ditto -c -k --sequesterRsrc --keepParent OpenMix.app OpenMix.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMix-macos
          path: build/OpenMix.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Package
        run: |
          cd OpenMix-linux && tar czf ../OpenMix-linux.tar.gz OpenMix && cd ..
          cd OpenMix-windows && zip -r ../OpenMix-windows.zip . && cd ..
          mv OpenMix-macos/OpenMix.zip OpenMix-macos.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            OpenMix-linux.tar.gz
            OpenMix-windows.zip
            OpenMix-macos.zip
